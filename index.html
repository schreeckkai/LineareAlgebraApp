<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --brand:    #644533;
  --black:    #111111;
  --white:    #ffffff;
  --offwhite: #f8f7f4;
  --border:   #c8c4bc;
  --muted:    #6b6560;
  --serif:    'Times New Roman', Times, serif;
  --brand-font: 'Creepster', cursive;
}
html, body { height: 100%; }
body { font-family: var(--serif); background: var(--offwhite); color: var(--black); font-size: 17px; line-height: 1.8; }

/* HEADER */
.app-header { background: var(--white); border-bottom: 3px solid var(--black); padding: 18px 32px; text-align: center; }
.app-header h1 { font-family: var(--brand-font); font-size: 2.4rem; color: var(--brand); letter-spacing: 0.04em; line-height: 1; }

/* MAIN */
.main { max-width: 860px; margin: 0 auto; padding: 40px 24px 80px; }

/* AUFGABENLISTE */
#screen-list { display: block; }
.list-intro { font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 24px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
.task-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
@media (max-width: 640px) { .task-grid { grid-template-columns: 1fr; } }
@media (min-width: 641px) and (max-width: 900px) { .task-grid { grid-template-columns: repeat(2, 1fr); } }
.task-btn { background: var(--white); border: 1px solid var(--border); padding: 20px 16px; cursor: pointer; text-align: left; font-family: var(--serif); font-size: 0.95rem; line-height: 1.4; color: var(--black); transition: border-color 0.15s, background 0.15s; min-height: 80px; display: flex; align-items: center; }
.task-btn:hover { border-color: var(--black); background: #f0ede8; }

/* LERNPFAD */
#screen-learn { display: none; }
.progress-wrap { display: flex; gap: 4px; margin-bottom: 36px; }
.prog-seg { height: 3px; flex: 1; background: var(--border); transition: background 0.3s; }
.prog-seg.done { background: var(--black); }
.prog-seg.active { background: var(--muted); }
.station-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 20px; }

/* CONTENT BOX */
.content-box { background: var(--white); border: 1px solid var(--border); padding: 32px 36px; margin-bottom: 8px; }
@media (max-width: 600px) { .content-box { padding: 20px 18px; } }
.box-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 14px; }

/* TEXTE */
.aufgaben-text { font-size: 1rem; line-height: 1.85; text-align: left; }
.ziel-text { font-size: 1.05rem; font-style: italic; text-align: left; }

/* SCHRITTE */
.schritt-nr { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 4px; }
.schritt-titel { font-weight: bold; font-size: 1.05rem; margin-bottom: 12px; }
.schritt-warum { font-size: 0.95rem; margin-bottom: 14px; color: #333; }
.schritt-rechnung { background: var(--offwhite); border-left: 3px solid var(--border); padding: 14px 16px; overflow-x: auto; font-size: 0.92rem; }

/* FEHLER */
.fehler-item { border-left: 3px solid #c0392b; padding: 12px 16px; background: #fef8f8; margin-bottom: 10px; font-size: 0.93rem; line-height: 1.7; }
.fehler-item:last-child { margin-bottom: 0; }

/* ÜBEN */
.ueben-hint { font-size: 0.82rem; color: var(--muted); font-style: italic; margin-bottom: 18px; }
.ueben-schritt { padding: 10px 14px; border: 1px solid var(--border); margin-bottom: 6px; font-weight: bold; font-size: 0.95rem; background: var(--offwhite); color: var(--muted); }
.aufdecken-btn { width: 100%; padding: 13px; border: 1px solid var(--black); background: var(--white); font-family: var(--serif); font-size: 0.9rem; cursor: pointer; text-align: center; letter-spacing: 0.04em; transition: background 0.15s; margin-top: 16px; }
.aufdecken-btn:hover { background: #f0ede8; }
.loesung-hidden { display: none; margin-top: 12px; }
.aufgedeckter-schritt { margin-bottom: 14px; padding: 16px; border: 1px solid var(--border); background: var(--white); }
.aufgedeckter-schritt .schritt-rechnung { padding: 10px 12px; font-size: 0.85rem; }

/* ERGEBNIS */
.ergebnis-box { border: 2px solid var(--black); padding: 18px 22px; text-align: left; margin-top: 16px; font-size: 1rem; overflow-x: auto; }

/* LERNKARTEN */
.karte { border: 1px solid var(--border); margin-bottom: 8px; background: var(--white); }
.karte-front { padding: 16px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; transition: background 0.15s; }
.karte-front:hover { background: #f5f3ef; }
.karte-frage { font-size: 0.95rem; line-height: 1.6; flex: 1; }
.karte-icon { color: var(--muted); font-size: 1rem; flex-shrink: 0; margin-top: 2px; }
.karte-back { display: none; padding: 16px 20px; border-top: 1px solid var(--border); background: var(--offwhite); font-size: 0.9rem; line-height: 1.7; }
.karte-back.open { display: block; }
.glueckwunsch-box { background: var(--white); border: 2px solid var(--black); padding: 40px 36px; text-align: center; }
.glueckwunsch-icon { font-size: 2.8rem; margin-bottom: 16px; }
.glueckwunsch-titel { font-size: 1.4rem; font-weight: bold; margin-bottom: 12px; }
.glueckwunsch-text { font-size: 0.95rem; color: var(--muted); line-height: 1.8; }
.abschluss-loesung { display: none; margin-top: 16px; }

/* TRENNSEITE */
.trenn-box {
  background: var(--black);
  color: var(--white);
  padding: 60px 40px;
  min-height: 260px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.trenn-titel {
  font-family: var(--serif);
  font-size: 1.8rem;
  font-weight: bold;
  letter-spacing: 0.02em;
  margin-bottom: 24px;
  line-height: 1.2;
}
.trenn-text {
  font-size: 1rem;
  line-height: 1.85;
  color: #cccccc;
  max-width: 560px;
}
@media (max-width: 600px) {
  .trenn-box { padding: 40px 24px; min-height: 200px; }
  .trenn-titel { font-size: 1.4rem; }
}

/* NAV */
.nav-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-top: 28px; padding-top: 20px; border-top: 1px solid var(--border); }
.btn-weiter { padding: 11px 32px; background: var(--black); color: var(--white); border: none; font-family: var(--serif); font-size: 0.88rem; letter-spacing: 0.04em; cursor: pointer; transition: background 0.15s; }
.btn-weiter:hover { background: #333; }
.btn-back { background: none; border: none; font-family: var(--serif); font-size: 0.82rem; color: var(--muted); cursor: pointer; }
.btn-back:hover { color: var(--black); }
.btn-prev { padding: 11px 22px; background: var(--white); color: var(--black); border: 1px solid var(--border); font-family: var(--serif); font-size: 0.88rem; letter-spacing: 0.04em; cursor: pointer; transition: background 0.15s; }
.btn-prev:hover { background: #f0ede8; border-color: var(--black); }

/* KATEX */
.katex-display { text-align: left !important; margin: 0.4em 0 !important; overflow-x: auto; display: block !important; }
.katex-display .katex { text-align: left !important; }
.katex-display::-webkit-scrollbar { display: none; }
.schritt-rechnung { scrollbar-width: none; }
.schritt-rechnung::-webkit-scrollbar { display: none; }
</style>
</head>

}


];

/* ══════════════════════════════════════════════
   APP-ZUSTAND
══════════════════════════════════════════════ */
let aktAufgabe = null;
let aktStation = 0;
let aktSchritt = 0;
let aktBeispiel = 0;

// ── NEU: typ-Felder für sichere Navigation ──
const STATIONEN = [
  { label: "Aufgabe lesen",        typ: "aufgabe",    render: renderAufgabe },
  { label: "Ziel verstehen",       typ: "ziel",       render: renderZiel },
  { label: "Lösung",               typ: "trenn",      render: (d,el) => renderTrennseite("Lösung der Aufgabe", "Schaue dir die Lösung Schritt für Schritt an. Versuche jeden Schritt zu verstehen – löse noch nichts selbst.", el) },
  { label: "Lösung",               typ: "loesung",    render: renderLoesung },
  { label: "Anwendungsbeispiele",  typ: "trenn",      render: (d,el) => renderTrennseite("Anwendungsbeispiele", "Sieh, wo diese Mathematik in der echten Welt auftaucht – das hilft dir, den Sinn hinter der Rechnung zu verstehen.", el) },
  { label: "Anwendungsbeispiele",  typ: "beispiele",  render: renderBeispiele },
  { label: "Typische Fehler",      typ: "trenn",      render: (d,el) => renderTrennseite("Typische Fehler", "Hier siehst du, wo Schüler bei dieser Aufgabe am häufigsten stolpern – erkenne sie, bevor sie dir passieren.", el) },
  { label: "Typische Fehler",      typ: "fehler",     render: renderFehler },
  { label: "Selbst lösen",         typ: "trenn",      render: (d,el) => renderTrennseite("Jetzt bist du dran", "Löse jetzt eine ähnliche Aufgabe selbst auf Papier. Nutze die Schritte als Gerüst, aber rechne eigenständig.", el) },
  { label: "Selbst lösen",         typ: "ueben",      render: renderUeben },
  { label: "Lernkarten",           typ: "trenn",      render: (d,el) => renderTrennseite("Lernkarten", "Teste dein Verständnis: Lies die Frage, denke nach – dann decke die Antwort auf.", el) },
  { label: "Lernkarten",           typ: "lernkarten", render: renderLernkarten },
  { label: "Abschlussaufgabe",     typ: "trenn",      render: (d,el) => renderTrennseite("Abschlussaufgabe", "Die letzte Herausforderung: Löse diese Aufgabe vollständig und ohne Hilfe – zeige was du gelernt hast.", el) },
  { label: "Abschlussaufgabe",     typ: "abschluss",  render: renderAbschluss },
  { label: "Abgeschlossen",        typ: "glueckwunsch", render: renderGlueckwunsch },
];

/* ══════════════════════════════════════════════
   INIT
══════════════════════════════════════════════ */
document.getElementById('app-titel').textContent = APP_TITEL;
document.getElementById('page-title').textContent = APP_TITEL;
buildListe();

function buildListe() {
  const el = document.getElementById('screen-list');
  el.innerHTML = '<p class="list-intro">Wähle eine Aufgabe</p><div class="task-grid" id="task-grid"></div>';
  const grid = document.getElementById('task-grid');
  AUFGABEN.forEach((a, i) => {
    const btn = document.createElement('button');
    btn.className = 'task-btn';
    btn.textContent = a.thema;
    btn.onclick = () => starteAufgabe(i);
    grid.appendChild(btn);
  });
}

function starteAufgabe(idx) {
  aktAufgabe = AUFGABEN[idx];
  aktStation = 0; aktSchritt = 0; aktBeispiel = 0;
  document.getElementById('screen-list').style.display = 'none';
  document.getElementById('screen-learn').style.display = 'block';
  zeigeStation();
  window.scrollTo(0,0);
}

function zurueck() {
  document.getElementById('screen-list').style.display = 'block';
  document.getElementById('screen-learn').style.display = 'none';
  aktAufgabe = null;
}

function weiter() {
  // ── NEU: Typ statt Nummer prüfen ──
  if (STATIONEN[aktStation].typ === 'loesung' && aktSchritt < aktAufgabe.schritte.length - 1) {
    aktSchritt++; zeigeStation(); window.scrollTo(0,0); return;
  }
  if (STATIONEN[aktStation].typ === 'beispiele' && aktBeispiel < aktAufgabe.beispiele.length - 1) {
    aktBeispiel++; zeigeStation(); window.scrollTo(0,0); return;
  }
  if (aktStation < STATIONEN.length - 1) {
    aktStation++; aktSchritt = 0; aktBeispiel = 0; zeigeStation(); window.scrollTo(0,0);
  } else {
    zurueck();
  }
}

function einZurueck() {
  // ── NEU: Typ statt Nummer prüfen ──
  if (STATIONEN[aktStation].typ === 'loesung' && aktSchritt > 0) {
    aktSchritt--; zeigeStation(); window.scrollTo(0,0); return;
  }
  if (STATIONEN[aktStation].typ === 'beispiele' && aktBeispiel > 0) {
    aktBeispiel--; zeigeStation(); window.scrollTo(0,0); return;
  }
  if (aktStation > 0) {
    aktStation--;
    // Beim Zurückgehen zum letzten Schritt/Beispiel springen
    if (STATIONEN[aktStation].typ === 'loesung') aktSchritt = aktAufgabe.schritte.length - 1;
    if (STATIONEN[aktStation].typ === 'beispiele') aktBeispiel = aktAufgabe.beispiele.length - 1;
    zeigeStation(); window.scrollTo(0,0);
  } else {
    zurueck();
  }
}

/* ══════════════════════════════════════════════
   STATION ANZEIGEN
══════════════════════════════════════════════ */
function zeigeStation() {
  const learn = document.getElementById('screen-learn');
  learn.innerHTML = '';

  const pw = mk('div','progress-wrap');
  STATIONEN.forEach((_,i) => pw.appendChild(mk('div','prog-seg'+(i<aktStation?' done':i===aktStation?' active':''))));
  learn.appendChild(pw);

  const lbl = mk('div','station-label');
  lbl.textContent = STATIONEN[aktStation].label;
  learn.appendChild(lbl);

  STATIONEN[aktStation].render(aktAufgabe, learn);

  const nav = mk('div','nav-row');

  const back = mk('button','btn-back');
  back.textContent = '← Aufgabenliste'; back.onclick = zurueck;

  const prev = mk('button','btn-prev');
  prev.textContent = '← Zurück'; prev.onclick = einZurueck;
  if (aktStation === 0) { prev.style.opacity = '0.3'; prev.style.pointerEvents = 'none'; }

  const fwd = mk('button','btn-weiter');
  const letzteStation = aktStation === STATIONEN.length - 1;
  const letzterSchritt = STATIONEN[aktStation].typ === 'loesung' && aktSchritt === aktAufgabe.schritte.length - 1;
  const letztesBeispiel = STATIONEN[aktStation].typ === 'beispiele' && aktBeispiel === aktAufgabe.beispiele.length - 1;
  if (letzteStation) fwd.textContent = 'Fertig ✓';
  else if (STATIONEN[aktStation].typ === 'loesung' && !letzterSchritt) fwd.textContent = 'Nächster Schritt →';
  else if (STATIONEN[aktStation].typ === 'beispiele' && !letztesBeispiel) fwd.textContent = 'Nächstes Beispiel →';
  else fwd.textContent = 'Weiter →';
  fwd.onclick = weiter;

  nav.appendChild(back); nav.appendChild(prev); nav.appendChild(fwd);
  learn.appendChild(nav);
  renderMath(learn);
}

   STATIONEN
══════════════════════════════════════════════ */
function renderAufgabe(data, el) {
  const box = mk('div','content-box');
  box.innerHTML = '<div class="box-label">Aufgabentext</div><div class="aufgaben-text">'+rt(data.aufgabentext)+'</div>';
  el.appendChild(box);
}

function renderZiel(data, el) {
  const box = mk('div','content-box');
  box.innerHTML = '<div class="box-label">Ziel dieser Aufgabe</div><div class="ziel-text">'+rt(data.ziel)+'</div>';
  el.appendChild(box);
}

function renderLoesung(data, el) {
  const s = data.schritte[aktSchritt];
  const n = aktAufgabe.schritte.length;
  const box = mk('div','content-box');
  box.innerHTML = '<div class="box-label">Schritt '+(aktSchritt+1)+' von '+n+'</div>'
    +'<div class="schritt-nr">Schritt '+(aktSchritt+1)+'</div>'
    +'<div class="schritt-titel">'+t(s.titel)+'</div>'
    +'<div class="schritt-warum">'+rt(s.warum)+'</div>'
    +'<div class="schritt-rechnung">'+lz(s.rechnung)+'</div>';
  if (aktSchritt === n-1) {
    const erg = mk('div','ergebnis-box'); erg.innerHTML = '$$'+data.endergebnis+'$$'; box.appendChild(erg);
    const erkl = mk('div',''); erkl.style.cssText='margin-top:18px;padding:14px 16px;border-left:3px solid #c0392b;background:#fef8f8;font-size:0.88rem;'; erkl.textContent = data.erklaerung; box.appendChild(erkl);
  }
  el.appendChild(box);
}

function renderBeispiele(data, el) {
  const box = mk('div','content-box');
  box.innerHTML = '<div class="box-label">Anwendungsbeispiel '+(aktBeispiel+1)+' von '+data.beispiele.length+'</div><div style="font-size:0.95rem;line-height:1.85">'+rt(data.beispiele[aktBeispiel])+'</div>';
  el.appendChild(box);
}

function renderFehler(data, el) {
  const box = mk('div','content-box');
  box.innerHTML = '<div class="box-label">Typische Fehler bei dieser Aufgabe</div>';
  data.typische_fehler.forEach((f,i) => { const d=mk('div','fehler-item'); d.innerHTML='<strong>Fehler '+(i+1)+':</strong> '+rt(f); box.appendChild(d); });
  el.appendChild(box);
}

function renderUeben(data, el) {
  const u = data.uebung;
  const box = mk('div','content-box');
  box.innerHTML = '<div class="box-label">Deine Aufgabe – jetzt selbst lösen</div><div class="aufgaben-text" style="margin-bottom:20px">'+rt(u.aufgabentext)+'</div><div class="ueben-hint">Löse die Aufgabe auf Papier. Die Schritte helfen dir beim Strukturieren:</div>';
  u.schritte.forEach((s,i) => { const d=mk('div','ueben-schritt'); d.textContent='Schritt '+(i+1)+': '+s.titel; box.appendChild(d); });
  el.appendChild(box);

  const btn = mk('button','aufdecken-btn'); btn.textContent='Lösung aufdecken ▾'; el.appendChild(btn);
  const lBox = mk('div','loesung-hidden');
  u.loesung_schritte.forEach((s,i) => {
    const sd = mk('div','aufgedeckter-schritt');
    sd.innerHTML='<div class="schritt-nr">Schritt '+(i+1)+'</div><div class="schritt-titel">'+t(s.titel)+'</div><div class="schritt-warum">'+rt(s.warum)+'</div><div class="schritt-rechnung">'+lz(s.rechnung)+'</div>';
    lBox.appendChild(sd);
  });
  const erg = mk('div','ergebnis-box'); erg.innerHTML='$$'+u.endergebnis+'$$'; lBox.appendChild(erg);
  el.appendChild(lBox);
  btn.onclick = () => {
    const open = lBox.style.display==='block';
    lBox.style.display = open?'none':'block';
    btn.textContent = open?'Lösung aufdecken ▾':'Lösung verbergen ▴';
    if (!open) renderMath(lBox);
  };
}

function renderLernkarten(data, el) {
  const mBox = mk('div','content-box'); mBox.style.marginBottom='16px';
  mBox.innerHTML='<div class="box-label">Merkhilfe</div><div style="font-size:0.93rem;line-height:1.8">'+rt(data.merkhilfe)+'</div>';
  el.appendChild(mBox);

  const vBox = mk('div','content-box');

function bauKarte(k) {
  const karte = mk('div','karte');
  const front = mk('div','karte-front');
  front.innerHTML='<span class="karte-frage">'+rt(k.frage)+'</span><span class="karte-icon">▾</span>';
  const back = mk('div','karte-back'); back.innerHTML = rt(k.antwort);
  front.onclick = () => { const o=back.classList.contains('open'); back.classList.toggle('open',!o); front.querySelector('.karte-icon').textContent=o?'▾':'▴'; };
  karte.appendChild(front); karte.appendChild(back);
  return karte;
}

/* ══════════════════════════════════════════════
   HILFE
══════════════════════════════════════════════ */
function mk(tag,cls) { const e=document.createElement(tag); if(cls)e.className=cls; return e; }

function t(s) { if(!s)return''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function rt(s) {
  if(!s) return '';
  const parts = [];
  let rest = String(s);
  const re = /(\$\$[\s\S]*?\$\$|\$[^$\n]+?\$)/g;
  let last = 0, m;
  while ((m = re.exec(rest)) !== null) {
    if (m.index > last) {
      parts.push(rest.slice(last, m.index)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'));
    }
    parts.push(m[0]);
    last = m.index + m[0].length;
  }
  if (last < rest.length) {
    parts.push(rest.slice(last)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'));
  }
  return parts.join('');
}

function lz(s) { if(!s)return''; return String(s).split('\\\\').map(z=>'<div style="margin:0.3em 0">$$'+z.trim()+'$$</div>').join(''); }
function renderMath(el) { renderMathInElement(el,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],throwOnError:false,strict:false}); }
